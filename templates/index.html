<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FITPRICE - Full System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #ffffff; }
        .input-disabled { background-color: #f8fafc !important; cursor: not-allowed; opacity: 0.5; }
        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .banner-slide { display: none; }
        .banner-slide.active { display: block; animation: fadeEffect 1s; }
        @keyframes fadeEffect { from {opacity: 0.4} to {opacity: 1} }
    </style>
</head>
<body class="antialiased text-gray-900">

    <header class="bg-white/80 backdrop-blur-md border-b border-gray-100 py-4 px-6 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-9 h-9 bg-green-600 rounded-xl flex items-center justify-center text-white font-black italic shadow-lg">F</div>
                <h1 class="text-2xl font-black tracking-tighter text-gray-800">FIT<span class="text-green-600">PRICE</span></h1>
            </div>
        </div>
    </header>

    <section class="max-w-5xl mx-auto px-4 mt-8">
        <div id="ad-slider" class="relative w-full h-48 md:h-64 rounded-[2.5rem] overflow-hidden shadow-2xl border border-gray-50 bg-gray-50">
            <div class="banner-slide active h-full w-full"><img src="/static/images/banner1.jpg" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/800x400?text=FITPRICE+PROMO+1'"></div>
            <div class="banner-slide h-full w-full"><img src="/static/images/banner2.jpg" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/800x400?text=FITPRICE+PROMO+2'"></div>
        </div>
    </section>

    <main class="max-w-4xl mx-auto px-4 py-12">
        <div class="bg-white shadow-[0_20px_50px_rgba(0,0,0,0.05)] rounded-[2.5rem] p-10 border border-gray-50 relative overflow-hidden">
            <div class="absolute top-0 left-0 w-2 h-full bg-green-500"></div>
            
            <form id="diet-form" class="space-y-8">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-[11px] font-black text-gray-400 uppercase tracking-[0.2em] ml-1">აირჩიეთ კატეგორია</label>
                        <select id="category-select" name="category" class="w-full bg-gray-50 border-2 border-gray-100 rounded-2xl px-5 py-4 outline-none focus:border-green-500 transition font-bold text-gray-700">
                            <option value="all">ყველა კატეგორია</option>
                        </select>
                    </div>

                    <div class="space-y-2">
                        <label class="text-[11px] font-black text-gray-400 uppercase tracking-[0.2em] ml-1">ფილტრის რეჟიმი</label>
                        <select id="filter-mode" name="filterMode" class="w-full bg-gray-50 border-2 border-gray-100 rounded-2xl px-5 py-4 outline-none focus:border-green-500 transition font-bold text-gray-700">
                            <option value="all">ყველა პროდუქტი</option>
                            <option value="include">მხოლოდ მონიშნული</option>
                            <option value="exclude">ყველა გარდა მონიშნულისა</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-2 col-span-2">
                        <label class="text-[11px] font-black text-gray-400 uppercase tracking-[0.2em] ml-1">დღიური კალორიები</label>
                        <input type="number" name="calories" id="cal-input" placeholder="მაგ: 2000" class="w-full bg-gray-50 border-2 border-gray-100 rounded-2xl px-5 py-4 outline-none focus:border-green-500 transition font-bold text-lg">
                    </div>
                </div>

                <div class="grid grid-cols-3 gap-4">
                    <div class="space-y-2 text-center">
                        <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest">ცილა (გ)</label>
                        <input type="number" name="protein" id="p-input" placeholder="0" class="macro-input w-full bg-white border-2 border-gray-100 rounded-2xl py-4 text-center outline-none focus:border-blue-500 font-black text-blue-600 transition">
                    </div>
                    <div class="space-y-2 text-center">
                        <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest">ნახშირწ. (გ)</label>
                        <input type="number" name="carbs" id="c-input" placeholder="0" class="macro-input w-full bg-white border-2 border-gray-100 rounded-2xl py-4 text-center outline-none focus:border-orange-500 font-black text-orange-600 transition">
                    </div>
                    <div class="space-y-2 text-center">
                        <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest">ცხიმი (გ)</label>
                        <input type="number" name="fat" id="f-input" placeholder="0" class="macro-input w-full bg-white border-2 border-gray-100 rounded-2xl py-4 text-center outline-none focus:border-red-500 font-black text-red-600 transition">
                    </div>
                </div>

                <button type="submit" id="submit-btn" class="w-full bg-green-600 hover:bg-green-700 text-white font-black py-5 rounded-2xl transition-all shadow-xl shadow-green-100 text-lg">საუკეთესო ალტერნატივის პოვნა</button>
            </form>
        </div>

        <div id="result-container" class="hidden mt-12 fade-in">
            <div class="bg-white rounded-[2.5rem] p-10 border border-gray-50 shadow-2xl">
                
                <div class="grid grid-cols-4 gap-2 mb-8 text-center bg-gray-50 p-4 rounded-2xl">
                    <div><p class="text-[10px] font-bold text-gray-400 uppercase">კალორია</p><p id="sum-cal" class="font-black text-gray-800"></p></div>
                    <div><p class="text-[10px] font-bold text-gray-400 uppercase">ცილა</p><p id="sum-p" class="font-black text-blue-600"></p></div>
                    <div><p class="text-[10px] font-bold text-gray-400 uppercase">ნახშირწ.</p><p id="sum-c" class="font-black text-orange-600"></p></div>
                    <div><p class="text-[10px] font-bold text-gray-400 uppercase">ცხიმი</p><p id="sum-f" class="font-black text-red-600"></p></div>
                </div>

                <div id="items-list" class="space-y-4 mb-10"></div>
                
                <div class="p-6 bg-gray-900 rounded-[2rem] flex justify-between items-center shadow-2xl">
                    <span class="text-gray-400 font-bold text-sm uppercase tracking-widest ml-4">ჯამური ღირებულება</span>
                    <span class="text-white font-black text-3xl mr-4" id="total-price-display">0.00₾</span>
                </div>

                <div id="recipe-section" class="mt-8 hidden fade-in">
                    <div class="p-8 bg-green-50 rounded-[2.5rem] border-2 border-green-100">
                        <div class="flex items-center gap-2 mb-4"><span class="text-xl">👨‍🍳</span><h4 class="font-black text-green-800 text-xs uppercase tracking-widest">მზარეულის რეცეპტი</h4></div>
                        <div id="recipe-content" class="text-gray-700 leading-relaxed font-medium whitespace-pre-wrap text-sm"></div>
                    </div>
                </div>

                <button onclick="generateRecipe()" class="w-full mt-6 bg-white border-2 border-gray-100 hover:border-green-500 text-gray-600 font-black py-4 rounded-[1.5rem] transition-all flex items-center justify-center gap-2">
                    ✨ მოამზადე კერძი ამ პროდუქტებით
                </button>
            </div>
        </div>
    </main>

    <script>
        let lastResult = null;

        // ბანერების ლოგიკა
        let currentSlide = 0;
        const slides = document.querySelectorAll('.banner-slide');
        setInterval(() => {
            if(slides.length > 0) {
                slides[currentSlide].classList.remove('active');
                currentSlide = (currentSlide + 1) % slides.length;
                slides[currentSlide].classList.add('active');
            }
        }, 5000);

        // კატეგორიების სინქრონიზაცია
        async function loadCategories() {
            try {
                const res = await fetch('/api/get_categories');
                const cats = await res.json();
                const select = document.getElementById('category-select');
                cats.forEach(c => {
                    const opt = document.createElement('option');
                    opt.value = c; opt.innerText = c; select.appendChild(opt);
                });
            } catch (e) { console.error(e); }
        }

        // ინპუტების ბლოკირება
        const calInput = document.getElementById('cal-input');
        const macroInputs = document.querySelectorAll('.macro-input');
        function toggleFields() {
            const isCal = calInput.value.length > 0;
            const isMacro = Array.from(macroInputs).some(i => i.value.length > 0);
            macroInputs.forEach(i => { i.disabled = isCal; i.classList.toggle('input-disabled', isCal); });
            calInput.disabled = isMacro; calInput.classList.toggle('input-disabled', isMacro);
        }
        calInput.addEventListener('input', toggleFields);
        macroInputs.forEach(i => i.addEventListener('input', toggleFields));

        // გაანგარიშება
        document.getElementById('diet-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.innerText = "ითვლება..."; btn.disabled = true;

            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());

            const payload = {
                protein: data.protein || 0,
                carbs: data.carbs || 0,
                fat: data.fat || 0,
                calories: data.calories || 0,
                selectedCategories: data.category === 'all' ? [] : [data.category],
                filterMode: data.filterMode,
                selectedPromos: []
            };

            const res = await fetch('/api/calculate', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            lastResult = await res.json();

            // მაკროების შეჯამება
            document.getElementById('sum-cal').innerText = lastResult.totals.cal + " კკალ";
            document.getElementById('sum-p').innerText = lastResult.totals.p + "გ";
            document.getElementById('sum-c').innerText = lastResult.totals.c + "გ";
            document.getElementById('sum-f').innerText = lastResult.totals.f + "გ";

            document.getElementById('items-list').innerHTML = lastResult.items.map(item => `
                <div class="flex justify-between items-center p-5 bg-gray-50 rounded-2xl border border-gray-100">
                    <div><p class="font-black text-xs uppercase">${item.name}</p><p class="text-[10px] font-bold text-green-600 italic uppercase">${item.display}</p></div>
                    <p class="font-black text-lg">${item.cost.toFixed(2)}₾</p>
                </div>`).join('');
            
            document.getElementById('total-price-display').innerText = lastResult.total_cost.toFixed(2) + "₾";
            document.getElementById('result-container').classList.remove('hidden');
            btn.innerText = "საუკეთესო ალტერნატივის პოვნა"; btn.disabled = false;
        });

        async function generateRecipe() {
            const content = document.getElementById('recipe-content');
            document.getElementById('recipe-section').classList.remove('hidden');
            content.innerText = "👨‍🍳 მზარეული ფიქრობს...";
            const res = await fetch('/api/get_recipe', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ items: lastResult.items, totals: lastResult.totals })
            });
            const data = await res.json();
            content.innerText = data.recipe || data.error;
        }

        window.onload = loadCategories;
    </script>
</body>
</html>
