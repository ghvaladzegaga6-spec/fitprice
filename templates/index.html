<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FITPRICE - SMART DIET</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .input-disabled { background-color: #f1f5f9 !important; opacity: 0.6; cursor: not-allowed; }
        .banner-slide { display: none; }
        .banner-slide.active { display: block; animation: fade 1s; }
        @keyframes fade { from {opacity: 0.5} to {opacity: 1} }
    </style>
</head>
<body class="bg-white text-gray-900">

    <div id="promo-modal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
        <div class="bg-white rounded-[2rem] max-w-md w-full p-8 shadow-2xl">
            <h3 class="text-xl font-black mb-4"> დღის შეთავაზება</h3>
            <div id="promo-list" class="space-y-3 mb-6"></div>
            <div class="flex gap-2">
                <button onclick="closePromo(false)" class="flex-1 py-4 bg-gray-100 font-bold rounded-xl">გამოტოვება</button>
                <button onclick="closePromo(true)" class="flex-1 py-4 bg-green-600 text-white font-bold rounded-xl">დამატება</button>
            </div>
        </div>
    </div>

    <header class="p-6 border-b flex justify-between items-center sticky top-0 bg-white/80 backdrop-blur-md z-50">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-green-600 rounded-lg flex items-center justify-center text-white font-black">F</div>
            <span class="text-xl font-black">FITPRICE</span>
        </div>
    </header>

    <section class="max-w-4xl mx-auto px-4 mt-6">
        <div id="slider" class="h-40 rounded-3xl overflow-hidden bg-gray-100 relative">
            <div class="banner-slide active h-full"><img src="/static/images/banner1.jpg" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/800x200?text=AD+1'"></div>
            <div class="banner-slide h-full"><img src="/static/images/banner2.jpg" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/800x200?text=AD+2'"></div>
        </div>
    </section>

    <main class="max-w-3xl mx-auto px-4 py-10">
        <div class="bg-white rounded-[2rem] p-8 border shadow-sm">
            <form id="diet-form" class="space-y-6">
                <div class="grid md:grid-cols-2 gap-4">
                    <div class="flex flex-col gap-2">
                        <label class="text-xs font-bold text-gray-400 uppercase">მაღაზია</label>
                        <select class="p-4 bg-gray-50 rounded-xl border-0 font-bold">
                            <option>ორი ნაბიჯი</option>
                        </select>
                    </div>
                    <div class="flex flex-col gap-2">
                        <label class="text-xs font-bold text-gray-400 uppercase">კალორია</label>
                        <input type="number" name="calories" id="cal-input" class="p-4 bg-gray-50 rounded-xl border-0 font-bold focus:ring-2 ring-green-500">
                    </div>
                </div>
                <div class="grid grid-cols-3 gap-3">
                    <input type="number" name="protein" id="p-input" placeholder="ცილა" class="macro-input p-4 bg-blue-50/50 rounded-xl border-0 text-center font-bold text-blue-600">
                    <input type="number" name="carbs" id="c-input" placeholder="ნახშირწ." class="macro-input p-4 bg-orange-50/50 rounded-xl border-0 text-center font-bold text-orange-600">
                    <input type="number" name="fat" id="f-input" placeholder="ცხიმი" class="macro-input p-4 bg-red-50/50 rounded-xl border-0 text-center font-bold text-red-600">
                </div>
                <button type="submit" id="submit-btn" class="w-full py-5 bg-green-600 text-white font-black rounded-2xl shadow-lg hover:bg-green-700 transition">გამოთვლა</button>
            </form>
        </div>

        <div id="result-container" class="hidden mt-10 space-y-6">
            <div id="items-list" class="space-y-3"></div>
            <div id="totals-display" class="grid grid-cols-4 gap-2"></div>
            <div class="p-6 bg-black rounded-2xl flex justify-between items-center text-white">
                <span class="font-bold opacity-60">ჯამური ფასი:</span>
                <span id="total-price-display" class="text-2xl font-black">0.00₾</span>
            </div>
        </div>
    </main>

    <script>
        // სლაიდერი
        let slideIdx = 0;
        const slides = document.querySelectorAll('.banner-slide');
        setInterval(() => {
            slides[slideIdx].classList.remove('active');
            slideIdx = (slideIdx + 1) % slides.length;
            slides[slideIdx].classList.add('active');
        }, 8000);

        const calInput = document.getElementById('cal-input');
        const macroInputs = document.querySelectorAll('.macro-input');
        const submitBtn = document.getElementById('submit-btn');

        function toggleInputs() {
            const hasCal = calInput.value !== "";
            const hasMacro = Array.from(macroInputs).some(i => i.value !== "");
            macroInputs.forEach(i => { i.disabled = hasCal; i.classList.toggle('input-disabled', hasCal); });
            calInput.disabled = hasMacro; calInput.classList.toggle('input-disabled', hasMacro);
        }
        [calInput, ...macroInputs].forEach(el => el.addEventListener('input', toggleInputs));

        let currentPromos = [], selectedPromos = [];

        document.getElementById('diet-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            submitBtn.disabled = true;
            try {
                const res = await fetch('/get_promos');
                currentPromos = await res.json();
                if (currentPromos.length > 0) {
                    document.getElementById('promo-list').innerHTML = currentPromos.map((p, i) => `
                        <label class="flex items-center p-4 border rounded-xl cursor-pointer hover:bg-gray-50">
                            <input type="checkbox" class="promo-check mr-3 w-5 h-5 accent-green-600" value="${i}">
                            <div class="flex-1"><p class="font-bold text-sm uppercase">${p.product}</p><p class="text-xs text-gray-400">${p.price}₾</p></div>
                        </label>`).join('');
                    document.getElementById('promo-modal').classList.remove('hidden');
                } else { startCalc(); }
            } catch { startCalc(); }
        });

        function closePromo(add) {
            selectedPromos = [];
            if (add) document.querySelectorAll('.promo-check:checked').forEach(c => selectedPromos.push(currentPromos[c.value]));
            document.getElementById('promo-modal').classList.add('hidden');
            startCalc();
        }

        async function startCalc() {
            submitBtn.innerText = "ითვლება...";
            const data = Object.fromEntries(new FormData(document.getElementById('diet-form')));
            data.selectedPromos = selectedPromos;

            try {
                const r = await fetch('/calculate', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
                const res = await r.json();
                
                document.getElementById('items-list').innerHTML = res.items.map(i => `
                    <div class="p-5 bg-gray-50 rounded-2xl flex justify-between items-center border border-gray-100">
                        <div><p class="font-black text-sm uppercase">${i.name}</p><p class="text-xs text-green-600 font-bold">${i.display}</p></div>
                        <p class="font-black">${i.cost.toFixed(2)}₾</p>
                    </div>`).join('');

                document.getElementById('totals-display').innerHTML = `
                    <div class="p-4 bg-gray-100 rounded-xl text-center"><p class="text-[9px] font-bold opacity-50">კალ</p><p class="font-black">${res.totals.cal}</p></div>
                    <div class="p-4 bg-blue-50 rounded-xl text-center text-blue-600"><p class="text-[9px] font-bold opacity-50">ცილა</p><p class="font-black">${res.totals.p}გ</p></div>
                    <div class="p-4 bg-orange-50 rounded-xl text-center text-orange-600"><p class="text-[9px] font-bold opacity-50">ნახშირწ</p><p class="font-black">${res.totals.c}გ</p></div>
                    <div class="p-4 bg-red-50 rounded-xl text-center text-red-600"><p class="text-[9px] font-bold opacity-50">ცხიმი</p><p class="font-black">${res.totals.f}გ</p></div>`;

                document.getElementById('total-price-display').innerText = res.total_cost.toFixed(2) + "₾";
                document.getElementById('result-container').classList.remove('hidden');
            } catch { alert("შეცდომა კალკულაციისას"); }
            finally { submitBtn.disabled = false; submitBtn.innerText = "გამოთვლა"; }
        }
    </script>
</body>
</html>
