<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FITPRICE - კატეგორიების ფილტრი</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #ffffff; }
        .banner-slide { display: none; }
        .banner-slide.active { display: block; animation: fadeEffect 1s; }
        @keyframes fadeEffect { from {opacity: 0.4} to {opacity: 1} }
        .input-disabled { background-color: #f8fafc !important; cursor: not-allowed; opacity: 0.5; }
        
        /* სქროლის და ჩამოსაშლელი სვეტის სტილი */
        .category-scroll::-webkit-scrollbar { width: 6px; }
        .category-scroll::-webkit-scrollbar-track { background: #f1f5f9; }
        .category-scroll::-webkit-scrollbar-thumb { background: #16a34a; border-radius: 10px; }
        
        #category-wrapper {
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border: 1px solid #edf2f7;
            z-index: 100;
        }
    </style>
</head>
<body class="antialiased text-gray-900">

    <header class="bg-white/80 backdrop-blur-md border-b py-4 px-6 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-9 h-9 bg-green-600 rounded-xl flex items-center justify-center text-white font-black italic shadow-lg">F</div>
                <h1 class="text-2xl font-black tracking-tighter text-gray-800">FIT<span class="text-green-600">PRICE</span></h1>
            </div>
        </div>
    </header>

    <section class="max-w-5xl mx-auto px-4 mt-6">
        <div id="ad-slider" class="relative w-full h-44 rounded-[2rem] overflow-hidden shadow-xl border bg-gray-50">
            <div class="banner-slide active h-full w-full"><img src="/static/images/banner1.jpg" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/800x400?text=FITPRICE+1'"></div>
            <div class="banner-slide h-full w-full"><img src="/static/images/banner2.jpg" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/800x400?text=FITPRICE+2'"></div>
        </div>
    </section>

    <main class="max-w-4xl mx-auto px-4 py-10">
        <div class="bg-white shadow-2xl rounded-[2.5rem] p-8 md:p-10 border border-gray-100 relative">
            <div class="absolute top-0 left-0 w-2 h-full bg-green-500"></div>
            
            <form id="diet-form" class="space-y-8">
                
                <div class="space-y-4">
                    <div class="flex justify-between items-end">
                        <label class="text-[11px] font-black text-gray-400 uppercase tracking-widest ml-1">აირჩიეთ კატეგორიები</label>
                        <select name="filterMode" class="bg-gray-100 border-none rounded-lg px-3 py-1 text-[10px] font-black uppercase outline-none focus:ring-2 ring-green-500">
                            <option value="include">მხოლოდ მონიშნული</option>
                            <option value="exclude">ყველა გარდა მონიშნულისა</option>
                        </select>
                    </div>

                    <div class="relative">
                        <button type="button" onclick="toggleCategories()" class="w-full bg-gray-50 border-2 border-gray-100 rounded-2xl px-6 py-4 text-left font-bold text-gray-600 flex justify-between items-center hover:border-green-500 transition-all">
                            <span id="dropdown-label">კატეგორიების ჩამონათვალი</span>
                            <svg id="arrow" class="w-5 h-5 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                        </button>

                        <div id="category-wrapper" class="hidden absolute left-0 right-0 mt-2 bg-white rounded-2xl p-4 border">
                            <div id="category-list" class="max-h-64 overflow-y-auto category-scroll space-y-1">
                                <p class="text-xs text-gray-400 italic">იტვირთება...</p>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="text-[11px] font-black text-gray-400 uppercase tracking-widest ml-1">დღიური კალორიები</label>
                    <input type="number" name="calories" id="cal-input" placeholder="მაგ: 2000" class="w-full bg-gray-50 border-2 border-gray-100 rounded-2xl px-5 py-4 outline-none focus:border-green-500 transition font-bold text-lg">
                </div>

                <div class="grid grid-cols-3 gap-4">
                    <div class="space-y-2 text-center">
                        <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest">ცილა</label>
                        <input type="number" name="protein" id="p-input" placeholder="0" class="macro-input w-full bg-white border-2 border-gray-100 rounded-2xl py-4 text-center outline-none focus:border-blue-500 font-black text-blue-600 transition">
                    </div>
                    <div class="space-y-2 text-center">
                        <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest">ნახშირწ.</label>
                        <input type="number" name="carbs" id="c-input" placeholder="0" class="macro-input w-full bg-white border-2 border-gray-100 rounded-2xl py-4 text-center outline-none focus:border-orange-500 font-black text-orange-600 transition">
                    </div>
                    <div class="space-y-2 text-center">
                        <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest">ცხიმი</label>
                        <input type="number" name="fat" id="f-input" placeholder="0" class="macro-input w-full bg-white border-2 border-gray-100 rounded-2xl py-4 text-center outline-none focus:border-red-500 font-black text-red-600 transition">
                    </div>
                </div>

                <button type="submit" id="submit-btn" class="w-full bg-green-600 hover:bg-green-700 text-white font-black py-5 rounded-2xl transition-all shadow-xl text-lg">საუკეთესო ალტერნატივის პოვნა</button>
            </form>
        </div>

        <div id="result-container" class="hidden mt-12">
            <div class="bg-white rounded-[2.5rem] p-8 border shadow-2xl">
                <div id="totals-grid" class="grid grid-cols-4 gap-2 mb-8 text-center bg-gray-50 p-4 rounded-2xl border">
                    <div><p class="text-[9px] font-bold text-gray-400 uppercase">კალორია</p><p id="sum-cal" class="font-black text-gray-800 text-sm"></p></div>
                    <div><p class="text-[9px] font-bold text-gray-400 uppercase">ცილა</p><p id="sum-p" class="font-black text-blue-600 text-sm"></p></div>
                    <div><p class="text-[9px] font-bold text-gray-400 uppercase">ნახშირწ.</p><p id="sum-c" class="font-black text-orange-600 text-sm"></p></div>
                    <div><p class="text-[9px] font-bold text-gray-400 uppercase">ცხიმი</p><p id="sum-f" class="font-black text-red-600 text-sm"></p></div>
                </div>

                <div id="items-list" class="space-y-3 mb-8"></div>
                
                <div class="p-6 bg-gray-900 rounded-[1.5rem] flex justify-between items-center">
                    <span class="text-gray-400 font-bold text-xs uppercase tracking-widest">ჯამური ღირებულება</span>
                    <span class="text-white font-black text-2xl" id="total-price-display">0.00₾</span>
                </div>

                <button onclick="generateRecipe()" class="w-full mt-6 bg-white border-2 border-gray-100 hover:border-green-500 text-gray-600 font-black py-4 rounded-xl transition-all">✨ AI მზარეულის რეცეპტი</button>
                <div id="recipe-section" class="mt-4 hidden p-6 bg-green-50 rounded-2xl text-sm font-medium text-gray-700 whitespace-pre-wrap border border-green-100"></div>
            </div>
        </div>
    </main>

    <script>
        let lastResult = null;

        // ბანერების ლოგიკა
        let currentSlide = 0;
        const slides = document.querySelectorAll('.banner-slide');
        setInterval(() => {
            if(slides.length > 0) {
                slides[currentSlide].classList.remove('active');
                currentSlide = (currentSlide + 1) % slides.length;
                slides[currentSlide].classList.add('active');
            }
        }, 4000);

        // ჩამოსაშლელი სიის გადართვა
        function toggleCategories() {
            const wrapper = document.getElementById('category-wrapper');
            const arrow = document.getElementById('arrow');
            const isHidden = wrapper.classList.contains('hidden');
            wrapper.classList.toggle('hidden');
            arrow.style.transform = isHidden ? 'rotate(180deg)' : 'rotate(0deg)';
        }

        // კატეგორიების ჩატვირთვა პითონიდან
        async function loadCategories() {
            try {
                const res = await fetch('/api/get_categories');
                const cats = await res.json();
                const list = document.getElementById('category-list');
                list.innerHTML = cats.map(c => `
                    <label class="flex items-center space-x-3 p-3 hover:bg-gray-50 rounded-xl cursor-pointer transition">
                        <input type="checkbox" name="selectedCategory" value="${c}" onchange="updateLabel()" class="w-5 h-5 accent-green-600 rounded">
                        <span class="text-xs font-bold text-gray-700 uppercase tracking-tighter">${c}</span>
                    </label>
                `).join('');
            } catch (e) { console.error("Error:", e); }
        }

        function updateLabel() {
            const count = document.querySelectorAll('input[name="selectedCategory"]:checked').length;
            document.getElementById('dropdown-label').innerText = count > 0 ? `მონიშნულია: ${count}` : "კატეგორიების ჩამონათვალი";
        }

        // ინპუტების ლოგიკა
        const calInput = document.getElementById('cal-input');
        const macroInputs = document.querySelectorAll('.macro-input');
        function toggleFields() {
            const isCal = calInput.value.length > 0;
            const isMacro = Array.from(macroInputs).some(i => i.value.length > 0);
            macroInputs.forEach(i => { i.disabled = isCal; i.classList.toggle('input-disabled', isCal); });
            calInput.disabled = isMacro; calInput.classList.toggle('input-disabled', isMacro);
        }
        calInput.addEventListener('input', toggleFields);
        macroInputs.forEach(i => i.addEventListener('input', toggleFields));

        // გათვლა
        document.getElementById('diet-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.innerText = "ითვლება..."; btn.disabled = true;

            const formData = new FormData(e.target);
            const payload = {
                protein: formData.get('protein') || 0,
                carbs: formData.get('carbs') || 0,
                fat: formData.get('fat') || 0,
                calories: formData.get('calories') || 0,
                selectedCategories: formData.getAll('selectedCategory'),
                filterMode: formData.get('filterMode'),
                selectedPromos: []
            };

            const res = await fetch('/api/calculate', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            lastResult = await res.json();

            document.getElementById('sum-cal').innerText = lastResult.totals.cal + " კკალ";
            document.getElementById('sum-p').innerText = lastResult.totals.p + "გ";
            document.getElementById('sum-c').innerText = lastResult.totals.c + "გ";
            document.getElementById('sum-f').innerText = lastResult.totals.f + "გ";

            document.getElementById('items-list').innerHTML = lastResult.items.map(item => `
                <div class="flex justify-between items-center p-4 bg-gray-50 rounded-xl border">
                    <div><p class="font-black text-[11px] uppercase">${item.name}</p>
                    <p class="text-[9px] font-bold text-green-600 italic uppercase">${item.display}</p></div>
                    <p class="font-black text-md">${item.cost.toFixed(2)}₾</p>
                </div>`).join('');
            
            document.getElementById('total-price-display').innerText = lastResult.total_cost.toFixed(2) + "₾";
            document.getElementById('result-container').classList.remove('hidden');
            btn.innerText = "საუკეთესო ალტერნატივის პოვნა"; btn.disabled = false;
            document.getElementById('category-wrapper').classList.add('hidden');
        });

        async function generateRecipe() {
            const section = document.getElementById('recipe-section');
            section.classList.remove('hidden');
            section.innerText = "👨‍🍳 მზარეული ფიქრობს...";
            const res = await fetch('/api/get_recipe', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ items: lastResult.items, totals: lastResult.totals })
            });
            const data = await res.json();
            section.innerText = data.recipe || data.error;
        }

        window.onload = loadCategories;
    </script>
</body>
</html>
