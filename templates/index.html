<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FITPRICE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #fff; }
        .category-chip { transition: all 0.2s; cursor: pointer; border: 2px solid #f8fafc; }
        .category-chip.selected { background-color: #16a34a; color: white; border-color: #16a34a; transform: scale(1.05); }
        .input-disabled { background-color: #f8fafc !important; opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body class="antialiased text-gray-900">

    <div id="promo-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
        <div class="bg-white rounded-[2.5rem] max-w-lg w-full p-8 shadow-2xl">
            <h3 class="text-2xl font-black mb-2">სპეციალური შეთავაზება</h3>
            <div id="promo-list" class="space-y-3 my-6"></div>
            <div class="flex gap-3">
                <button onclick="closePromo(false)" class="flex-1 py-4 bg-gray-100 font-bold rounded-2xl">გამოტოვება</button>
                <button onclick="closePromo(true)" class="flex-1 py-4 bg-green-600 text-white font-black rounded-2xl">დამატება</button>
            </div>
        </div>
    </div>

    <main class="max-w-4xl mx-auto px-4 py-12">
        <div class="bg-white shadow-2xl rounded-[2.5rem] p-8 md:p-10 border border-gray-50">
            <form id="diet-form" class="space-y-8">
                <div class="space-y-4">
                    <label class="text-[11px] font-black text-gray-400 uppercase tracking-widest ml-1">აირჩიეთ კატეგორიები</label>
                    <div id="category-container" class="flex flex-wrap gap-2"></div>
                    <select id="filter-mode" class="text-xs font-bold text-gray-500 bg-gray-50 rounded-xl px-3 py-2 outline-none">
                        <option value="all">ყველა პროდუქტი</option>
                        <option value="include">მხოლოდ მონიშნული</option>
                        <option value="exclude">ყველა, გარდა მონიშნულისა</option>
                    </select>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-[11px] font-black text-gray-400 uppercase tracking-widest ml-1">კალორიები</label>
                        <input type="number" name="calories" id="cal-input" placeholder="მაგ: 2000" class="w-full bg-gray-50 border-2 border-gray-100 rounded-2xl px-5 py-4 outline-none focus:border-green-500 font-bold text-lg">
                    </div>
                    <div class="grid grid-cols-3 gap-3">
                        <input type="number" name="protein" id="p-input" placeholder="ცილა" class="macro-input w-full bg-white border-2 border-gray-100 rounded-2xl py-4 text-center outline-none focus:border-blue-500 font-black text-blue-600">
                        <input type="number" name="carbs" id="c-input" placeholder="ნახშ" class="macro-input w-full bg-white border-2 border-gray-100 rounded-2xl py-4 text-center outline-none focus:border-orange-500 font-black text-orange-600">
                        <input type="number" name="fat" id="f-input" placeholder="ცხიმ" class="macro-input w-full bg-white border-2 border-gray-100 rounded-2xl py-4 text-center outline-none focus:border-red-500 font-black text-red-600">
                    </div>
                </div>

                <button type="submit" id="submit-btn" class="w-full bg-green-600 hover:bg-green-700 text-white font-black py-5 rounded-2xl transition-all shadow-xl text-lg">საუკეთესო ალტერნატივის პოვნა</button>
            </form>
        </div>

        <div id="result-container" class="hidden mt-12 space-y-6">
            <div id="items-list" class="space-y-3"></div>
            <div class="bg-gray-900 text-white p-6 rounded-[2rem] flex justify-between items-center">
                <span class="font-bold uppercase text-xs opacity-50">ჯამი:</span>
                <span id="total-price-display" class="font-black text-3xl">0.00₾</span>
            </div>
            <button onclick="generateRecipe()" class="w-full bg-gray-50 font-black py-4 rounded-2xl text-gray-500 border border-gray-100">✨ AI რეცეპტი</button>
            <div id="recipe-display" class="hidden p-6 bg-green-50 rounded-[2rem] text-sm text-green-900 leading-relaxed whitespace-pre-line"></div>
        </div>
    </main>

    <script>
        let selectedCategories = [], currentPromos = [], selectedPromos = [], lastResult = null;

        async function loadCategories() {
            const res = await fetch('/api/get_categories');
            const cats = await res.json();
            document.getElementById('category-container').innerHTML = cats.map(cat => `
                <div onclick="toggleCategory('${cat}')" id="cat-${cat}" class="category-chip px-4 py-2 rounded-xl bg-gray-50 text-xs font-black text-gray-500">${cat}</div>
            `).join('');
        }

        function toggleCategory(cat) {
            const el = document.getElementById(`cat-${cat}`);
            if(selectedCategories.includes(cat)) {
                selectedCategories = selectedCategories.filter(c => c !== cat);
                el.classList.remove('selected');
            } else {
                selectedCategories.push(cat);
                el.classList.add('selected');
            }
        }

        const calInput = document.getElementById('cal-input');
        const macroInputs = document.querySelectorAll('.macro-input');
        function toggleFields() {
            const isCal = calInput.value.length > 0;
            const isMacro = Array.from(macroInputs).some(i => i.value.length > 0);
            macroInputs.forEach(i => { i.disabled = isCal; i.classList.toggle('input-disabled', isCal); });
            calInput.disabled = isMacro; calInput.classList.toggle('input-disabled', isMacro);
        }
        calInput.addEventListener('input', toggleFields);
        macroInputs.forEach(i => i.addEventListener('input', toggleFields));

        document.getElementById('diet-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.innerText = "ითვლება..."; btn.disabled = true;
            try {
                const pRes = await fetch('/api/get_promos');
                currentPromos = await pRes.json();
                if(currentPromos.length > 0) {
                    document.getElementById('promo-list').innerHTML = currentPromos.map((p, i) => `
                        <label class="flex items-center p-4 border rounded-2xl cursor-pointer">
                            <input type="checkbox" class="promo-check w-5 h-5 accent-green-600 mr-4" value="${i}">
                            <div class="flex-1"><p class="font-black text-xs uppercase">${p.product}</p><p class="text-[10px] text-gray-400">${p.price}₾</p></div>
                        </label>`).join('');
                    document.getElementById('promo-modal').classList.remove('hidden');
                } else { startCalculation(); }
            } catch { startCalculation(); }
        });

        function closePromo(apply) {
            selectedPromos = [];
            if(apply) document.querySelectorAll('.promo-check:checked').forEach(c => selectedPromos.push(currentPromos[c.value]));
            document.getElementById('promo-modal').classList.add('hidden');
            startCalculation();
        }

        async function startCalculation() {
            const formData = new FormData(document.getElementById('diet-form'));
            const data = Object.fromEntries(formData.entries());
            data.selectedCategories = selectedCategories;
            data.filterMode = document.getElementById('filter-mode').value;
            data.selectedPromos = selectedPromos;

            const res = await fetch('/api/calculate', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            lastResult = await res.json();
            
            document.getElementById('items-list').innerHTML = lastResult.items.map(item => `
                <div class="flex justify-between items-center p-5 bg-gray-50 rounded-2xl">
                    <div><p class="font-black text-xs uppercase">${item.name}</p><p class="text-[10px] font-bold text-green-600">${item.display}</p></div>
                    <p class="font-black">${item.cost.toFixed(2)}₾</p>
                </div>`).join('');
            
            document.getElementById('total-price-display').innerText = lastResult.total_cost.toFixed(2) + "₾";
            document.getElementById('result-container').classList.remove('hidden');
            document.getElementById('submit-btn').innerText = "საუკეთესო ალტერნატივის პოვნა";
            document.getElementById('submit-btn').disabled = false;
        }

        async function generateRecipe() {
            const display = document.getElementById('recipe-display');
            display.classList.remove('hidden');
            display.innerText = "მზარეული ფიქრობს...";
            const res = await fetch('/api/get_recipe', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ items: lastResult.items, totals: lastResult.totals })
            });
            const data = await res.json();
            display.innerText = data.recipe || data.error;
        }

        window.onload = loadCategories;
    </script>
</body>
</html>
